<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C41E3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle with TV UitWijk red gradient -->
  <circle cx="96" cy="96" r="90" fill="url(#grad1)" />
  
  <!-- White circle for contrast -->
  <circle cx="96" cy="96" r="70" fill="white" />
  
  <!-- TV UitWijk text in primary red -->
  <text x="96" y="75" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#C41E3A" text-anchor="middle">TV</text>
  <text x="96" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#C41E3A" text-anchor="middle">UitWijk</text>
  
  <!-- Tennis racket icon -->
  <circle cx="96" cy="130" r="15" fill="#003366" />
  <rect x="85" y="125" width="22" height="10" fill="#FFD700" rx="2" />
</svg>
