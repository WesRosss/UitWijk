<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C41E3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle with TV UitWijk red gradient -->
  <circle cx="32" cy="32" r="30" fill="url(#grad1)" />
  
  <!-- White circle for contrast -->
  <circle cx="32" cy="32" r="22" fill="white" />
  
  <!-- TV text in primary red -->
  <text x="32" y="28" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C41E3A" text-anchor="middle">TV</text>
  
  <!-- Tennis racket icon -->
  <circle cx="32" cy="42" r="5" fill="#003366" />
</svg>
