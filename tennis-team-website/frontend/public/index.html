<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TV UitWijk Tennis Team - Competition Management System">
  <meta name="keywords" content="tennis, competition, team, management, scheduling, matches, TV UitWijk">
  <meta name="author" content="TV UitWijk">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="logo-192.svg">
  <link rel="apple-touch-icon" sizes="192x192" href="logo-192.svg">
  <link rel="apple-touch-icon" sizes="512x512" href="logo-512.svg">
  
  <!-- Theme Color - TV UitWijk Primary Red (#C41E3A) -->
  <meta name="theme-color" content="#C41E3A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TV UitWijk">
  
  <!-- PWA iOS Splash Screen -->
  <meta name="apple-mobile-web-app-splash-screen" content="yes">
  
  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="TV UitWijk Tennis Team">
  <meta property="og:description" content="Competition Management System for TV UitWijk Tennis Team">
  <meta property="og:type" content="website">
  <meta property="og:image" content="logo-512.svg">
  <meta property="og:site_name" content="TV UitWijk Tennis Team">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="TV UitWijk Tennis Team">
  <meta name="twitter:description" content="Competition Management System for TV UitWijk Tennis Team">
  <meta name="twitter:image" content="logo-512.svg">
  <meta name="twitter:image:alt" content="TV UitWijk Tennis Team Logo">
  
  <!-- Preconnect to external resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Icons&display=swap" rel="stylesheet">
  
  <!-- Material Design Icons -->
  <link href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css" rel="stylesheet">
  
  <!-- PWA Service Worker Registration -->
  <script>
    // Register service worker for PWA support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(registration => {
            console.log('ServiceWorker registration successful: ', registration.scope);
          })
          .catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
  
  <title>TV UitWijk Tennis Team</title>
</head>
<body>
  <noscript>
    <strong>We're sorry but this app doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
  </noscript>
  
  <!-- Loading spinner -->
  <div id="loading-spinner" class="loading-spinner">
    <div class="spinner">
      <div class="bounce1"></div>
      <div class="bounce2"></div>
      <div class="bounce3"></div>
    </div>
    <p>Loading...</p>
  </div>
  
  <div id="app"></div>

  <!-- Built files will be auto injected -->
  <script type="module" src="/src/main.js"></script>
