<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C41E3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle with TV UitWijk red gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" />
  
  <!-- White circle for contrast -->
  <circle cx="256" cy="256" r="180" fill="white" />
  
  <!-- TV UitWijk text in primary red -->
  <text x="256" y="200" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#C41E3A" text-anchor="middle">TV</text>
  <text x="256" y="260" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#C41E3A" text-anchor="middle">UitWijk</text>
  
  <!-- Tennis Team text -->
  <text x="256" y="320" font-family="Arial, sans-serif" font-size="24" fill="#003366" text-anchor="middle">Tennis Team</text>
  
  <!-- Tennis racket icon -->
  <circle cx="256" cy="380" r="40" fill="#003366" />
  <rect x="216" y="370" width="80" height="20" fill="#FFD700" rx="5" />
  
  <!-- Decorative elements in gold -->
  <circle cx="100" cy="100" r="8" fill="#FFD700" />
  <circle cx="412" cy="100" r="8" fill="#FFD700" />
  <circle cx="100" cy="412" r="8" fill="#FFD700" />
  <circle cx="412" cy="412" r="8" fill="#FFD700" />
</svg>
