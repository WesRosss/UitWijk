<VirtualHost *:80>
    ServerName tennis-team.local
    ServerAdmin admin@tennis-team.local
    DocumentRoot /var/www/html

    # Logging
    ErrorLog /var/log/apache2/error.log
    CustomLog /var/log/apache2/access.log combined

    # Static files
    Alias /static/ /var/www/static/
    <Directory /var/www/static>
        Require all granted
    </Directory>

    # Frontend (Vue.js built files)
    <Directory /var/www/html>
        Require all granted
        Options -Indexes
    </Directory>

    # Proxy API requests to Django backend
    ProxyPreserveHost On
    ProxyPass /api http://backend:8000/api
    ProxyPassReverse /api http://backend:8000/api

    # WebSocket support for real-time notifications
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /ws/(.*) ws://backend:8000/ws/$1 [P,L]

    # Fallback to index.html for Vue.js routing
    FallbackResource /index.html

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
</VirtualHost>

<VirtualHost *:443>
    ServerName tennis-team.local
    ServerAdmin admin@tennis-team.local
    DocumentRoot /var/www/html

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/server.crt
    SSLCertificateKeyFile /etc/apache2/ssl/server.key

    # Logging
    ErrorLog /var/log/apache2/error-ssl.log
    CustomLog /var/log/apache2/access-ssl.log combined

    # Static files
    Alias /static/ /var/www/static/
    <Directory /var/www/static>
        Require all granted
    </Directory>

    # Frontend
    <Directory /var/www/html>
        Require all granted
        Options -Indexes
    </Directory>

    # Proxy API requests to Django backend
    ProxyPreserveHost On
    ProxyPass /api http://backend:8000/api
    ProxyPassReverse /api http://backend:8000/api

    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /ws/(.*) ws://backend:8000/ws/$1 [P,L]

    # Fallback to index.html for Vue.js routing
    FallbackResource /index.html

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
</VirtualHost>