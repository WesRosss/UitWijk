version: '3.8'

services:
  # Apache2 Web Server
  webserver:
    build:
      context: .
      dockerfile: docker/apache.Dockerfile
    container_name: tennis-webserver
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/apache/ssl:/etc/apache2/ssl
      - ./docker/apache/sites-enabled:/etc/apache2/sites-enabled
      - ./docker/apache/logs:/var/log/apache2
      - ./frontend/dist:/var/www/html
      - ./backend/static:/var/www/static
    depends_on:
      - backend
      - frontend
    networks:
      - tennis-network
    restart: unless-stopped

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: tennis-backend
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 tennis_backend.wsgi:application
    volumes:
      - ./backend:/app
      - ./config:/app/config
    environment:
      - DJANGO_SETTINGS_MODULE=tennis_backend.settings.production
      - DATABASE_URL=postgres://tennis_user:tennis_password@database:5432/tennis_db
      - SECRET_KEY=${DJANGO_SECRET_KEY:-default-secret-key-change-me}
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,webserver
      - CORS_ALLOWED_ORIGINS=http://localhost,https://localhost
    depends_on:
      database:
        condition: service_healthy
    networks:
      - tennis-network
    restart: unless-stopped

  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: tennis-database
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=tennis_db
      - POSTGRES_USER=tennis_user
      - POSTGRES_PASSWORD=tennis_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tennis_user -d tennis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tennis-network
    restart: unless-stopped

  # Vue.js Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: tennis-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - VUE_APP_API_URL=http://backend:8000
    command: npm run serve
    depends_on:
      - backend
    networks:
      - tennis-network
    restart: unless-stopped

  # Celery for background tasks (notifications)
  celery:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: tennis-celery
    command: celery -A tennis_backend worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./config:/app/config
    environment:
      - DJANGO_SETTINGS_MODULE=tennis_backend.settings.production
      - DATABASE_URL=postgres://tennis_user:tennis_password@database:5432/tennis_db
      - SECRET_KEY=${DJANGO_SECRET_KEY:-default-secret-key-change-me}
    depends_on:
      - backend
      - database
      - redis
    networks:
      - tennis-network
    restart: unless-stopped

  # Redis for Celery broker
  redis:
    image: redis:7-alpine
    container_name: tennis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tennis-network
    restart: unless-stopped

  # Celery Beat for scheduled tasks (hourly notifications)
  celery-beat:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: tennis-celery-beat
    command: celery -A tennis_backend beat --loglevel=info
    volumes:
      - ./backend:/app
      - ./config:/app/config
    environment:
      - DJANGO_SETTINGS_MODULE=tennis_backend.settings.production
      - DATABASE_URL=postgres://tennis_user:tennis_password@database:5432/tennis_db
      - SECRET_KEY=${DJANGO_SECRET_KEY:-default-secret-key-change-me}
    depends_on:
      - backend
      - database
      - redis
    networks:
      - tennis-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  tennis-network:
    driver: bridge