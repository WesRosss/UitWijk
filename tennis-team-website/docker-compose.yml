# Docker Compose configuration for Tennis Team Website
# Apache2 runs on the HOST MACHINE as reverse proxy
# This file only contains the application services

services:
  # Django Backend
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: tennis-backend
    command: gunicorn --bind 0.0.0.0:8000 --workers 4 tennis_backend.wsgi:application
    volumes:
      - ./backend:/app
      - ./config:/app/config
      - ./backend/static:/app/static
      - ./backend/media:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=tennis_backend.settings.production
      - DATABASE_URL=postgres://tennis_user:tennis_password@database:5432/tennis_db
      - SECRET_KEY=${DJANGO_SECRET_KEY:-change-this-in-production-use-long-random-string}
      - DEBUG=False
      - ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=http://localhost,https://localhost
    expose:
      - "8000"
    networks:
      - tennis-network
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy

  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: tennis-database
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=tennis_db
      - POSTGRES_USER=tennis_user
      - POSTGRES_PASSWORD=tennis_password
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tennis_user -d tennis_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tennis-network
    restart: unless-stopped

  # Vue.js Frontend (development mode)
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: tennis-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "8080"
    environment:
      - NODE_ENV=development
      - VUE_APP_API_URL=http://backend:8000
    command: npm run serve
    networks:
      - tennis-network
    restart: unless-stopped
    depends_on:
      - backend

  # Redis for Celery broker and caching
  redis:
    image: redis:7-alpine
    container_name: tennis-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - tennis-network
    restart: unless-stopped

  # Celery Worker for background tasks
  celery:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: tennis-celery
    command: celery -A tennis_backend worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./config:/app/config
    environment:
      - DJANGO_SETTINGS_MODULE=tennis_backend.settings.production
      - DATABASE_URL=postgres://tennis_user:tennis_password@database:5432/tennis_db
      - SECRET_KEY=${DJANGO_SECRET_KEY:-change-this-in-production-use-long-random-string}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - tennis-network
    restart: unless-stopped
    depends_on:
      - backend
      - database
      - redis

  # Celery Beat for scheduled tasks (hourly notifications)
  celery-beat:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: tennis-celery-beat
    command: celery -A tennis_backend beat --loglevel=info
    volumes:
      - ./backend:/app
      - ./config:/app/config
    environment:
      - DJANGO_SETTINGS_MODULE=tennis_backend.settings.production
      - DATABASE_URL=postgres://tennis_user:tennis_password@database:5432/tennis_db
      - SECRET_KEY=${DJANGO_SECRET_KEY:-change-this-in-production-use-long-random-string}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    networks:
      - tennis-network
    restart: unless-stopped
    depends_on:
      - backend
      - database
      - redis

volumes:
  postgres_data:
  redis_data:

networks:
  tennis-network:
    driver: bridge