# Apache2 Reverse Proxy Configuration for Tennis Team Website
# 
# This configuration should be placed on your HOST MACHINE (not in Docker)
# 
# Installation instructions:
# 1. Copy this file to /etc/apache2/sites-available/tennis-team.conf
# 2. Enable the site: sudo a2ensite tennis-team.conf
# 3. Enable required modules:
#    sudo a2enmod proxy
#    sudo a2enmod proxy_http
#    sudo a2enmod proxy_wstunnel
#    sudo a2enmod rewrite
#    sudo a2enmod headers
#    sudo a2enmod ssl (if using HTTPS)
# 4. Restart Apache2: sudo systemctl restart apache2

<VirtualHost *:80>
    ServerName tennis-team.yourdomain.com
    ServerAdmin admin@tennis-team.yourdomain.com
    
    # Logging
    ErrorLog ${APACHE_LOG_DIR}/tennis-team-error.log
    CustomLog ${APACHE_LOG_DIR}/tennis-team-access.log combined
    
    # Proxy requests to Docker containers
    
    # Backend API (Django on port 8000)
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api
    
    # Admin interface (Django admin on port 8000)
    ProxyPass /admin http://127.0.0.1:8000/admin
    ProxyPassReverse /admin http://127.0.0.1:8000/admin
    
    # Static files from Django
    ProxyPass /static http://127.0.0.1:8000/static
    ProxyPassReverse /static http://127.0.0.1:8000/static
    
    # Media files from Django
    ProxyPass /media http://127.0.0.1:8000/media
    ProxyPassReverse /media http://127.0.0.1:8000/media
    
    # Frontend (Vue.js on port 8080) - for development
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/
    
    # WebSocket support for real-time notifications
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteCond %{HTTP:Connection} =upgrade [NC]
    RewriteRule /ws/(.*) ws://127.0.0.1:8000/ws/$1 [P,L]
    
    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
</VirtualHost>

